<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Reviews</title>
    <style type="text/css">
        @font-face {
            font-family: Meditative;
            src: url(Meditative.ttf);
        }

        body {
            background-image: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.8492647058823529) 100%), url(tumblr_0831f9e3d6ede65959cbae769b148c38_624b587b_1280.gif);
            background-position: center;
            background-size: 100% 100%;
            margin: 0;
            padding: 0;
            color: white;
        }

        .container {
            position: relative;
            text-align: center;
            color: white;
            display: grid;
            height: 100vh;
        }

        .header {
            display: flex;
            position: fixed;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .header img {
            max-height: 60px;
            margin-left: 20px;
            border-radius: 40px;
            border: 2px solid #2c437c;
        }

        nav {
            margin-right: 50px;
        }

        .links-container {
            display: flex;
            justify-content: right;
            gap: 10px;
            font-family: Meditative;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        a:link, a:visited {
            background-color: white;
            color: #18396e;
            border: 2px solid #18396e;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            border-radius: 20px;
        }

        a:hover, a:active {
            background-color: #18396e;
            color: white;
            border-radius: 20px;
            transition: 0.3s;

        }

        main {
            flex: 1;
            padding: 100px 20px 20px;
        }

        table, td, th {
            border: 1px solid #ddd;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 20px;
        }

        th, td {
            padding: 15px;
            color: white;
            background-color: rgba(3, 3, 3, 0.5);
        }

        form {
            max-width: 600px;
            margin: 0 auto;
            text-align: left;
        }

        form label, form input, form textarea, form button {
            display: block;
            width: 100%;
            margin-bottom: 15px;
        }

        form input, form textarea {
            padding: 10px;
            font-size: 16px;
        }

        form button {
            background-color: rgb(255, 128, 128);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 18px;
        }

        form button:hover {
            background-color: white;
            color: rgb(255, 128, 128);
        }

        button {
            font-family: Meditative;
            font-size: 15px;
            background-color: white;
            color: #18396e;
            border: 2px solid #18396e;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            border-radius: 20px;
        }

        button:hover {
            background-color: #18396e;
            color: white;
            border-radius: 20px;
        }

        .burger {
            display: none;
            cursor: pointer;
            flex-direction: column;
            justify-content: space-between;
            height: 20px;
            width: 25px;
            margin-right: 20px;
        }

        .burger div {
            width: 100%;
            height: 3px;
            background-color: white;
            transition: all 0.3s ease;
        }

        @media screen and (max-width: 860px) {
            .links-container {
                display: none;
                flex-direction: column;
                width: 100%;
                position: fixed;
                top: 80px;
                left: 0;
                backdrop-filter: blur(10px);
                background-color: rgb(0 0 0 / 55%);
            }

            .links-container.nav-active {
                display: flex;
            }

            .burger {
                display: flex;
            }

            .toggle .line1 {
                transform: rotate(-45deg) translate(-5px, 6px);
            }

            .toggle .line2 {
                opacity: 0;
            }

            .toggle .line3 {
                transform: rotate(45deg) translate(-5px, -6px);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="Screenshot 2024-06-24 111958.png" alt="LevelUp Reviews Logo">
        <nav>
            <div class="links-container" id="navLinks">
                <a href="StartSeite.html">Home</a>
                <a href="Reviews.html">Reviews</a>
                <a href="Bestlist.html">Top 10</a>
                <a id="forumLink" href="Forum.html">Forum</a>
                <a id="loginButton" href="Login.html">Login</a>
                <button id="logoutButton" class="logout-button" onclick="logout()">Logout</button>
            </div>
            <div class="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </nav>
    </div>

    <main>
        <table id="reviewTable">
            <thead>
            <tr>
                <th>Name</th>
                <th>Titel</th>
                <th>Review</th>
            </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <form id="addReviewForm">

        </form>
    </main>

    <footer>
        &copy; 2024 LevelUp. Alle Rechte vorbehalten.
    </footer>
</div>
<script src="project.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    function fetchCatalog() {
        axios.get('/catalog')
            .then(response => {
                const reviews = response.data;
                const tableBody = document.getElementById('reviewTable').querySelector('tbody');
                tableBody.innerHTML = '';

                reviews.forEach(review => {
                    const row = document.createElement('tr');
                    const nameCell = document.createElement('td');
                    const titleCell = document.createElement('td');
                    const reviewCell = document.createElement('td');

                    nameCell.textContent = review.name;
                    titleCell.textContent = review.title;
                    reviewCell.textContent = review.text;

                    row.appendChild(nameCell);
                    row.appendChild(titleCell);
                    row.appendChild(reviewCell);
                    tableBody.appendChild(row);
                });
            })
            .catch(error => {
                console.error('Fehler beim Abrufen des Produktkatalogs:', error);
            });
    }

    document.getElementById('addReviewForm').addEventListener('submit', event => {
        event.preventDefault();
        const name = document.getElementById('productName').value;
        const title = document.getElementById('productTitle').value;
        const review = document.getElementById('textReview').value;

        axios.post('/add', {name, title, text: review})
            .then(() => {
                fetchCatalog();
                document.getElementById('addReviewForm').reset();
            })
            .catch(error => {
                console.error('Fehler beim Hinzufügen des Reviews:', error);
            });
    });

    fetchCatalog();

    document.addEventListener('DOMContentLoaded', () => {
        const burger = document.querySelector('.burger');
        const nav = document.querySelector('.links-container');

        burger.addEventListener('click', () => {
            nav.classList.toggle('nav-active');
            burger.classList.toggle('toggle');
        });
    });
</script>
</body>
</html>
