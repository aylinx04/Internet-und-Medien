<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LevelUp</title>
    <style type="text/css">
        @font-face {
            font-family: Meditative;
            src: url(Meditative.ttf);
        }

        body {
            background-image: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.8492647058823529) 100%), url(81340844a99a35cc7993166cbd9b5866.gif);
            background-position: center;
            background-size: 100% 100%;
            margin: 0;
            padding: 0;
        }

        .container {
            position: relative;
            text-align: center;
            color: white;
            display: grid;
            grid-template-rows: auto;
            height: 100vh;
            align-content: center;
        }

        .text {
            align-content: center;
            color: white;
            font-size: 50px;
            font-family: Meditative;
        }

        .header {
            display: flex;
            position: fixed;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .header img {
            max-height: 60px;
            margin-left: 20px;
            border-radius: 40px;
            border: 2px solid rgb(255, 128, 128);
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        nav {
            margin-right: 50px;
        }

        .links-container {
            display: flex;
            justify-content: right;
            gap: 10px;
            font-family: Meditative;
        }

        .links-container a, .review, button {
            padding: 10px 20px;
            margin: 5px 0;
            background-color: white;
            color: rgb(255, 128, 128);
            border: 2px solid rgb(255, 128, 128);
            text-align: center;
            text-decoration: none;
            display: inline-block;
            border-radius: 20px;
            font-family: Meditative;
            font-size: 15px;
        }

        .links-container a:hover, .review:hover, button:hover, .links-container a:active {
            background-color: rgb(255, 128, 128);
            color: white;
            border-radius: 20px;
            transition: 0.3s;
        }

        .burger {
            display: none;
            cursor: pointer;
            flex-direction: column;
            justify-content: space-between;
            height: 20px;
            width: 25px;
            margin-right: 20px;
        }

        .burger div {
            width: 100%;
            height: 3px;
            background-color: white;
            transition: all 0.3s ease;
        }

        @media screen and (max-width: 860px) {
            .links-container {
                display: none;
                flex-direction: column;
                width: 100%;
                position: fixed;
                top: 80px;
                left: 0;
                backdrop-filter: blur(10px);
                background-color: rgb(0 0 0 / 55%);
            }

            .links-container.nav-active {
                display: flex;
            }

            .burger {
                display: flex;
            }

            .toggle .line1 {
                transform: rotate(-45deg) translate(-5px, 6px);
            }

            .toggle .line2 {
                opacity: 0;
            }

            .toggle .line3 {
                transform: rotate(45deg) translate(-5px, -6px);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="Screenshot 2024-06-24 105059.png" alt="LevelUp Reviews Logo">
        <nav>
            <div class="links-container" id="navLinks">
                <a href="StartSeite.html">Home</a>
                <a href="Reviews.html">Reviews</a>
                <a href="Bestlist.html">Top 10</a>
                <a id="forumLink" href="Forum.html">Forum</a>
                <a id="loginButton" href="Login.html">Login</a>
                <button id="logoutButton" onclick="logout()">Logout</button>
            </div>
            <div class="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </nav>
    </div>
    <p class="text">Für die neusten Gaming Reviews klick hier</p>
    <div>
        <a class="review" href="Reviews.html">Reviews</a>
    </div>
    <footer>
        &copy; 2024 LevelUp. Alle Rechte vorbehalten.
    </footer>
</div>
<script src="project.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const burger = document.querySelector('.burger');
        const nav = document.querySelector('.links-container');

        burger.addEventListener('click', () => {
            nav.classList.toggle('nav-active');
            burger.classList.toggle('toggle');
        });
    });
</script>
</body>
</html>
